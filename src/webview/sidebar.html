<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Align.ai - Context & Alignment Guard</title>
    <style>
        :root {
            --bg-color: #09090b;
            --border-color: #27272a;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --input-bg: #18181b;
            --input-focus-border: #2563eb;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: "SF Mono", Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --status-synced: #10b981;
            --status-syncing: #f59e0b;
            --status-failed: #ef4444;
            --status-pruned: #71717a;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            font-size: 12px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Monolithic Section Headers and Dividers */
        .section {
            border-bottom: 1px solid var(--border-color);
            padding: 16px 0;
        }

        .section:first-of-type {
            padding-top: 0;
        }

        .section:last-of-type {
            border-bottom: none;
        }

        /* Top Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        h1 {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 10px;
            color: var(--text-secondary);
            margin: 0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Status Pill Badge */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            padding: 4px 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--status-synced);
        }

        .status-dot.syncing {
            background-color: var(--status-syncing);
            animation: pulse-blink 1s infinite alternate;
        }
        .status-dot.synced {
            background-color: var(--status-synced);
        }
        .status-dot.failed {
            background-color: var(--status-failed);
        }
        .status-dot.pruned {
            background-color: var(--status-pruned);
        }

        /* Code-like Tree Structure Section */
        .section-header {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tree-container {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            line-height: 1.8;
        }

        .tree-node {
            color: var(--text-secondary);
        }

        .tree-val {
            color: var(--text-primary);
            font-weight: 500;
        }

        /* Metadata & File Context List */
        .meta-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-label {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .meta-value {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* Controls, Dropdowns & Inputs */
        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], select {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-family: var(--font-stack);
            font-size: 12px;
            outline: none;
            box-shadow: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--input-focus-border);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 12px;
            padding-right: 32px;
        }

        /* Button Aesthetics */
        .btn {
            background-color: var(--accent-color);
            color: #ffffff;
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 550;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: none;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-ghost {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-ghost:hover {
            background-color: #18181b;
            border-color: #3f3f46;
        }

        .btn-danger-ghost {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger-ghost:hover {
            background-color: rgba(239, 68, 68, 0.05);
            border-color: var(--danger-color);
        }

        /* Console Output Container */
        .console-output {
            background-color: #0c0c0e;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            margin-top: 16px;
            display: none;
            flex-direction: column;
            gap: 8px;
            max-height: 250px;
            overflow-y: auto;
            animation: slide-down 0.2s ease-out;
        }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .console-title {
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .console-body {
            font-family: var(--font-mono);
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #e4e4e7;
            line-height: 1.6;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 9px;
            padding: 2px 4px;
            border-radius: 2px;
        }

        .btn-close:hover {
            color: var(--text-primary);
            background-color: #18181b;
        }

        /* Animations */
        @keyframes pulse-blink {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        @keyframes slide-down {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="section">
        <header>
            <div class="logo-group">
                <h1>Align.ai</h1>
                <p class="subtitle">Alignment Guard</p>
            </div>
            <div class="status-badge">
                <div class="status-dot synced" id="statusDot"></div>
                <span id="statusText">SYNCED</span>
            </div>
        </header>
    </div>

    <!-- Active Ingestion Constraints (Tree view) -->
    <div class="section">
        <div class="section-header">▶ ACTIVE INGESTION CONSTRAINTS</div>
        <div class="tree-container">
            <div><span class="tree-node">├─ Design:</span> <span class="tree-val">1280x720 | 16px Padding</span></div>
            <div><span class="tree-node">└─ Logic:</span> <span class="tree-val">Repo Pattern | PascalCase</span></div>
        </div>
    </div>

    <!-- Detected File Context -->
    <div class="section">
        <div class="section-header">▶ DETECTED FILE CONTEXT</div>
        <div class="meta-list">
            <div class="meta-item">
                <span class="meta-label">Active File</span>
                <span class="meta-value" id="activeFile">None Open</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Type</span>
                <span class="meta-value" id="activeFileType">Unknown File Type</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Memory Mode</span>
                <span class="meta-value text-gradient">Hybrid Graph-Vector</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Cloud Connected</span>
                <span class="meta-value" id="cogneeCloud">Checking...</span>
            </div>
        </div>
    </div>

    <!-- Operations Section -->
    <div class="section">
        <div class="section-header">▶ OPERATIONS</div>
        <div class="controls-group">
            <button class="btn" id="btnSync">
                Sync Active File
            </button>

            <button class="btn btn-ghost" id="btnSyncWorkspace">
                Sync Entire Workspace
            </button>

            <div class="field-group">
                <label for="queryType">Query Type</label>
                <select id="queryType">
                    <option value="UI/Styling">UI / Styling</option>
                    <option value="Logic/Architecture">Logic / Architecture</option>
                </select>
            </div>

            <div class="field-group">
                <label for="queryInput">Recall Context Prompt</label>
                <input type="text" id="queryInput" placeholder="e.g., spacing constraints, API routers exceptions">
            </div>

            <button class="btn btn-ghost" id="btnRecall">
                Recall Guardrails
            </button>

            <button class="btn btn-danger-ghost" id="btnPrune">
                Prune Graph Memory
            </button>
        </div>
    </div>

    <!-- Console Log Display -->
    <div class="console-output" id="outputCard">
        <div class="console-header">
            <span class="console-title" id="outputTitle">Console Log</span>
            <button class="btn-close" id="btnHideOutput">Hide</button>
        </div>
        <div class="console-body" id="outputBody"></div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        // UI element references
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const activeFile = document.getElementById('activeFile');
        const activeFileType = document.getElementById('activeFileType');
        const cogneeCloud = document.getElementById('cogneeCloud');
        
        const queryInput = document.getElementById('queryInput');
        const queryType = document.getElementById('queryType');
        
        const btnSync = document.getElementById('btnSync');
        const btnSyncWorkspace = document.getElementById('btnSyncWorkspace');
        const btnRecall = document.getElementById('btnRecall');
        const btnPrune = document.getElementById('btnPrune');
        const btnHideOutput = document.getElementById('btnHideOutput');
        
        const outputCard = document.getElementById('outputCard');
        const outputBody = document.getElementById('outputBody');
        const outputTitle = document.getElementById('outputTitle');

        // Check active server status
        vscode.postMessage({ command: 'checkStatus' });

        // Event listeners
        btnSync.addEventListener('click', () => {
            vscode.postMessage({ command: 'syncActive' });
        });

        btnSyncWorkspace.addEventListener('click', () => {
            vscode.postMessage({ command: 'syncWorkspace' });
        });

        btnRecall.addEventListener('click', () => {
            const query = queryInput.value.trim() || 'general constraints';
            const typeVal = queryType.value;
            vscode.postMessage({ command: 'recall', query: query, type: typeVal });
        });

        btnPrune.addEventListener('click', () => {
            vscode.postMessage({ command: 'forget' });
        });

        btnHideOutput.addEventListener('click', () => {
            outputCard.style.display = 'none';
        });

        // Communication channel from Extension Host
        window.addEventListener('message', event => {
            const message = event.data;
            
            switch (message.command) {
                case 'activeFileUpdate':
                    activeFile.textContent = message.fileName || 'None Open';
                    activeFileType.textContent = message.fileType || 'Unknown File Type';
                    break;
                    
                case 'statusUpdate':
                    statusText.textContent = message.text.toUpperCase();
                    
                    // Match visual styling classes for the dot indicator
                    let stateClass = 'synced';
                    if (message.stateClass === 'syncing' || message.stateClass === 'recalling') {
                        stateClass = 'syncing';
                    } else if (message.stateClass === 'failed') {
                        stateClass = 'failed';
                    } else if (message.stateClass === 'pruned') {
                        stateClass = 'pruned';
                    }
                    statusDot.className = 'status-dot ' + stateClass;
                    break;
                    
                case 'backendStatus':
                    if (message.status === 'online') {
                        cogneeCloud.textContent = message.available.toUpperCase();
                    } else {
                        cogneeCloud.textContent = 'DISCONNECTED';
                    }
                    break;

                case 'syncResult':
                    outputCard.style.display = 'flex';
                    outputTitle.textContent = 'SYNC STATUS LOG';
                    if (message.error) {
                        outputBody.textContent = 'ERROR:\n' + message.error;
                        outputBody.style.color = '#ef4444';
                    } else {
                        outputBody.textContent = message.message;
                        outputBody.style.color = '#10b981';
                    }
                    break;

                case 'recallResult':
                    outputCard.style.display = 'flex';
                    outputTitle.textContent = 'RECALLED CONTEXT PROMPT';
                    if (message.error) {
                        outputBody.textContent = 'ERROR:\n' + message.error;
                        outputBody.style.color = '#ef4444';
                    } else {
                        outputBody.textContent = message.payload;
                        outputBody.style.color = '#e4e4e7';
                    }
                    break;

                case 'pruneResult':
                    outputCard.style.display = 'flex';
                    outputTitle.textContent = 'PRUNING LOG';
                    outputBody.textContent = message.message;
                    outputBody.style.color = '#f59e0b';
                    break;
            }
        });

        // Polling loop
        setInterval(() => {
            vscode.postMessage({ command: 'checkStatus' });
        }, 10000);
    </script>
</body>
</html>
